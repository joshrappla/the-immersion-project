  <rect x="1045" y="136" width="130" height="18" fill="#1a0a02" opacity="0.65"/>
  <!-- Far distant mesa -->
  <path d="M870,180 Q960,160 1050,180 L1050,290 Q960,280 870,290Z" fill="#150802" opacity="0.5"/>
  <rect width="1920" height="400" fill="url(#fade)"/>
