<svg viewBox="0 0 1920 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Rolling green hills layered -->
  <path d="M0,300 Q200,240 400,270 Q600,300 800,250 Q1000,200 1200,255 Q1400,310 1600,265 Q1800,220 1920,260 L1920,400 L0,400Z" fill="#060e07" opacity="0.62"/>
  <path d="M0,340 Q250,305 500,325 Q750,345 1000,310 Q1250,275 1500,315 Q1750,355 1920,335 L1920,400 L0,400Z" fill="#04090504" opacity="0.8"/>
  <!-- Stonehenge silhouette (center-left) -->
  <g fill="#060e07" opacity="0.82" transform="translate(420,250)">
    <!-- Trilithons -->
    <rect x="0" y="0" width="22" height="80"/>
    <rect x="58" y="0" width="22" height="80"/>
    <rect x="-5" y="-15" width="90" height="18"/><!-- lintel -->
    <rect x="90" y="10" width="22" height="72"/>
    <rect x="148" y="10" width="22" height="72"/>
    <rect x="85" y="-5" width="90" height="17"/>
    <rect x="180" y="5" width="20" height="78"/>
    <rect x="238" y="5" width="20" height="78"/>
    <rect x="175" y="-10" width="88" height="17"/>
    <!-- Outer standing stones -->
    <rect x="-50" y="15" width="14" height="68"/>
    <rect x="290" y="15" width="14" height="68"/>
    <rect x="-80" y="20" width="12" height="62"/>
    <rect x="316" y="20" width="12" height="62"/>
    <!-- Fallen stone -->
    <rect x="60" y="78" width="80" height="14" transform="rotate(-8,100,85)"/>
  </g>
  <!-- Distant abbey ruins (right) -->
  <g fill="#060e07" opacity="0.6" transform="translate(1400,200)">
    <rect x="0" y="50" width="40" height="150"/>
    <!-- Gothic window opening -->
    <path d="M8,80 Q20,60 32,80Z" fill="#03060304"/>
    <rect x="60" y="80" width="35" height="120"/>
    <rect x="110" y="60" width="45" height="140"/>
    <polygon points="105,60 132,20 160,60"/><!-- gable -->
    <rect x="165" y="75" width="35" height="125"/>
    <rect x="210" y="90" width="40" height="110"/>
  </g>
  <rect width="1920" height="400" fill="url(#fade)"/>
</svg>
