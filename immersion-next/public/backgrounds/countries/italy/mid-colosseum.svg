    <rect x="20" y="118" width="180" height="60"/>
    <!-- Portico columns -->
    <rect x="35" y="90" width="12" height="30"/><rect x="60" y="90" width="12" height="30"/>
    <rect x="85" y="90" width="12" height="30"/><rect x="110" y="90" width="12" height="30"/>
    <rect x="135" y="90" width="12" height="30"/>
    <rect x="25" y="80" width="170" height="12"/><!-- entablature -->
