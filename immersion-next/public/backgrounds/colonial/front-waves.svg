<svg viewBox="0 0 1920 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <!-- Dock planks -->
  <rect x="0" y="100" width="1920" height="60" fill="#100804" opacity="0.9"/>
  <!-- Plank lines -->
  <g stroke="#0a0502" stroke-width="2" opacity="0.5">
    <line x1="0" y1="115" x2="1920" y2="115"/>
    <line x1="0" y1="128" x2="1920" y2="128"/>
    <line x1="0" y1="141" x2="1920" y2="141"/>
  </g>
  <!-- Vertical plank gaps -->
  <g stroke="#0a0502" stroke-width="1.5" opacity="0.35">
    <line x1="120" y1="100" x2="120" y2="160"/><line x1="240" y1="100" x2="240" y2="160"/>
    <line x1="360" y1="100" x2="360" y2="160"/><line x1="480" y1="100" x2="480" y2="160"/>
    <line x1="600" y1="100" x2="600" y2="160"/><line x1="720" y1="100" x2="720" y2="160"/>
    <line x1="840" y1="100" x2="840" y2="160"/><line x1="960" y1="100" x2="960" y2="160"/>
    <line x1="1080" y1="100" x2="1080" y2="160"/><line x1="1200" y1="100" x2="1200" y2="160"/>
    <line x1="1320" y1="100" x2="1320" y2="160"/><line x1="1440" y1="100" x2="1440" y2="160"/>
    <line x1="1560" y1="100" x2="1560" y2="160"/><line x1="1680" y1="100" x2="1680" y2="160"/>
    <line x1="1800" y1="100" x2="1800" y2="160"/>
  </g>
  <!-- Water waves in foreground -->
  <path d="M0,75 Q60,60 120,75 Q180,90 240,75 Q300,60 360,75 Q420,90 480,75 Q540,60 600,75 Q660,90 720,75 Q780,60 840,75 Q900,90 960,75 Q1020,60 1080,75 Q1140,90 1200,75 Q1260,60 1320,75 Q1380,90 1440,75 Q1500,60 1560,75 Q1620,90 1680,75 Q1740,60 1800,75 Q1860,90 1920,75 L1920,100 L0,100Z" fill="#100804" opacity="0.7"/>
  <!-- Rope coils -->
  <ellipse cx="300" cy="108" rx="22" ry="8" fill="#0a0502" opacity="0.6"/>
  <ellipse cx="1000" cy="106" rx="20" ry="7" fill="#0a0502" opacity="0.55"/>
  <ellipse cx="1600" cy="108" rx="24" ry="9" fill="#0a0502" opacity="0.6"/>
</svg>
