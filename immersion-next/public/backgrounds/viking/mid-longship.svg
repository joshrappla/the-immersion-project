    <polygon points="1455,255 1465,200 1475,255" fill="#061525"/>
    <polygon points="1510,300 1525,225 1540,300" fill="#061525"/>
    <polygon points="1515,260 1525,205 1535,260" fill="#061525"/>
    <polygon points="1570,300 1582,240 1594,300" fill="#061525"/>
    <polygon points="1640,300 1655,215 1670,300" fill="#061525"/>
    <polygon points="1645,255 1655,195 1665,255" fill="#061525"/>
    <polygon points="1700,300 1712,235 1724,300" fill="#061525"/>
