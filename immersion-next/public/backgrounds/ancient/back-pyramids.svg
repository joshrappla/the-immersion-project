<svg viewBox="0 0 1920 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="65%" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Distant small pyramids -->
  <polygon points="50,400 170,290 290,400" fill="#3d1e04" opacity="0.5"/>
  <polygon points="220,400 310,320 400,400" fill="#3d1e04" opacity="0.45"/>
  <!-- Main large pyramids -->
  <polygon points="250,400 550,80 850,400" fill="#2a1403" opacity="0.9"/>
  <polygon points="650,400 950,110 1250,400" fill="#3d1e04" opacity="0.95"/>
  <polygon points="1050,400 1280,170 1510,400" fill="#2a1403" opacity="0.85"/>
  <!-- Smaller right pyramids -->
  <polygon points="1400,400 1530,270 1660,400" fill="#3d1e04" opacity="0.6"/>
  <polygon points="1600,400 1700,300 1800,400" fill="#2a1403" opacity="0.5"/>
  <!-- Sphinx silhouette -->
  <g transform="translate(1680,310)" opacity="0.6">
    <ellipse cx="60" cy="55" rx="75" ry="35" fill="#2a1403"/>
    <rect x="50" y="20" width="40" height="45" fill="#2a1403"/>
    <ellipse cx="70" cy="22" rx="22" ry="22" fill="#2a1403"/>
    <rect x="50" y="40" width="50" height="8" fill="#2a1403"/>
  </g>
  <!-- Sand dune base -->
  <path d="M0,370 Q240,330 480,360 Q720,385 960,355 Q1200,325 1440,360 Q1680,390 1920,365 L1920,400 L0,400Z" fill="#2a1403" opacity="0.7"/>
  <rect width="1920" height="400" fill="url(#fade)"/>
</svg>
