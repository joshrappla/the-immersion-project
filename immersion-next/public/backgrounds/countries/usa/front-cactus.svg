<svg viewBox="0 0 1920 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <!-- Sandy ground -->
  <path d="M0,130 Q320,115 640,128 Q960,142 1280,120 Q1600,100 1920,125 L1920,200 L0,200Z" fill="#1e0b03" opacity="0.88"/>
  <!-- Saguaro cacti (large, iconic) -->
  <!-- Left cactus -->
  <g fill="#1a0902" opacity="0.85">
    <rect x="100" y="30" width="22" height="120" rx="5"/><!-- main trunk -->
    <rect x="60" y="65" width="50" height="14" rx="5"/><!-- left arm base -->
    <rect x="52" y="25" width="14" height="55" rx="5"/><!-- left arm up -->
    <rect x="130" y="72" width="50" height="14" rx="5"/><!-- right arm base -->
    <rect x="162" y="32" width="14" height="55" rx="5"/><!-- right arm up -->
    <!-- Ridges on trunk -->
    <line x1="107" y1="30" x2="107" y2="150" stroke="#150801" stroke-width="2"/>
    <line x1="114" y1="30" x2="114" y2="150" stroke="#150801" stroke-width="2"/>
  </g>
  <!-- Small barrel cactus -->
  <g fill="#1a0902" opacity="0.8" transform="translate(260,110)">
    <ellipse cx="20" cy="28" rx="18" ry="28"/>
    <g stroke="#150801" stroke-width="1.5" fill="none">
      <path d="M5,10 Q20,5 35,10"/><path d="M3,20 Q20,15 37,20"/>
      <path d="M2,30 Q20,25 38,30"/>
    </g>
  </g>
  <!-- Center large saguaro -->
  <g fill="#1a0902" opacity="0.88" transform="translate(900,10)">
    <rect x="0" y="0" width="28" height="160" rx="6"/>
    <rect x="-55" y="50" width="65" height="16" rx="6"/>
    <rect x="-68" y="0" width="16" height="65" rx="6"/>
    <rect x="62" y="45" width="65" height="16" rx="6"/>
    <rect x="89" y="0" width="16" height="60" rx="6"/>
  </g>
  <!-- Right smaller saguaro -->
  <g fill="#1a0902" opacity="0.78" transform="translate(1550,40)">
    <rect x="0" y="0" width="20" height="120" rx="4"/>
    <rect x="-38" y="40" width="46" height="12" rx="4"/>
    <rect x="-46" y="5" width="12" height="42" rx="4"/>
    <rect x="44" y="38" width="46" height="12" rx="4"/>
    <rect x="70" y="5" width="12" height="40" rx="4"/>
  </g>
  <!-- Skull / bleached wood suggestion (ambient) -->
  <g fill="#150801" opacity="0.5" transform="translate(1750,135)">
    <ellipse cx="25" cy="20" rx="25" ry="20"/>
    <ellipse cx="15" cy="30" rx="8" ry="6"/>
    <ellipse cx="35" cy="30" rx="8" ry="6"/>
  </g>
</svg>
