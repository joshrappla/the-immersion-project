<svg viewBox="0 0 1920 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <!-- Draped curtains framing the scene -->
  <!-- Left curtain -->
  <path d="M0,0 Q40,30 30,80 Q20,130 50,200 L0,200Z" fill="#2d0b0f" opacity="0.85"/>
  <path d="M0,0 Q70,40 55,100 Q40,155 80,200 L0,200Z" fill="#1c0a0e" opacity="0.7"/>
  <path d="M0,0 Q90,50 75,110 Q60,165 100,200 L50,200 Q20,155 35,100 Q50,45 0,0Z" fill="#3d0e14" opacity="0.5"/>
  <!-- Right curtain -->
  <path d="M1920,0 Q1880,30 1890,80 Q1900,130 1870,200 L1920,200Z" fill="#2d0b0f" opacity="0.85"/>
  <path d="M1920,0 Q1850,40 1865,100 Q1880,155 1840,200 L1920,200Z" fill="#1c0a0e" opacity="0.7"/>
  <path d="M1920,0 Q1830,50 1845,110 Q1860,165 1820,200 L1870,200 Q1900,155 1885,100 Q1870,45 1920,0Z" fill="#3d0e14" opacity="0.5"/>
  <!-- Rope/tassel on left -->
  <circle cx="95" cy="108" r="10" fill="#2d0b0f" opacity="0.6"/>
  <line x1="95" y1="118" x2="90" y2="155" stroke="#2d0b0f" stroke-width="3" opacity="0.5"/>
  <circle cx="90" cy="158" r="7" fill="#2d0b0f" opacity="0.5"/>
  <!-- Rope/tassel on right -->
  <circle cx="1825" cy="108" r="10" fill="#2d0b0f" opacity="0.6"/>
  <line x1="1825" y1="118" x2="1830" y2="155" stroke="#2d0b0f" stroke-width="3" opacity="0.5"/>
  <circle cx="1830" cy="158" r="7" fill="#2d0b0f" opacity="0.5"/>
  <!-- Bottom ledge -->
  <rect x="0" y="175" width="1920" height="25" fill="#1c0a0e" opacity="0.5"/>
</svg>
