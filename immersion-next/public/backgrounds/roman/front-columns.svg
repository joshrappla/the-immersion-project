<svg viewBox="0 0 1920 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <!-- Ground level -->
  <rect x="0" y="130" width="1920" height="50" fill="#0d0404" opacity="0.9"/>
  <!-- Broken column stumps and debris -->
  <g fill="#0d0404" opacity="0.88">
    <!-- Standing column left -->
    <rect x="80" y="30" width="32" height="102"/>
    <rect x="72" y="18" width="48" height="14"/><!-- capital -->
    <rect x="68" y="128" width="56" height="10"/><!-- base -->
    <!-- Broken column -->
    <rect x="220" y="65" width="28" height="67"/>
    <rect x="212" y="128" width="44" height="10"/>
    <!-- Column drums on ground -->
    <ellipse cx="280" cy="133" rx="20" ry="9" fill="#0d0404"/>
    <ellipse cx="310" cy="136" rx="15" ry="7" fill="#0d0404"/>
    <!-- Standing column mid -->
    <rect x="480" y="20" width="30" height="112"/>
    <rect x="472" y="8" width="46" height="14"/>
    <rect x="468" y="128" width="54" height="10"/>
    <!-- Partial column -->
    <rect x="650" y="50" width="28" height="82"/>
    <rect x="642" y="128" width="44" height="10"/>
    <!-- Rubble blocks -->
    <rect x="750" y="118" width="45" height="18"/>
    <rect x="780" y="108" width="35" height="14"/>
    <rect x="820" y="120" width="50" height="15"/>
    <!-- Column right side -->
    <rect x="1200" y="25" width="32" height="107"/>
    <rect x="1192" y="13" width="48" height="14"/>
    <rect x="1188" y="128" width="56" height="10"/>
    <!-- Fallen column drum -->
    <ellipse cx="1380" cy="134" rx="45" ry="14" fill="#0d0404"/>
    <!-- Standing column far right -->
    <rect x="1600" y="35" width="30" height="97"/>
    <rect x="1592" y="23" width="46" height="14"/>
    <rect x="1588" y="128" width="54" height="10"/>
    <!-- Archway remains -->
    <rect x="1760" y="60" width="25" height="72"/>
    <rect x="1820" y="60" width="25" height="72"/>
    <path d="M1760,60 Q1792,20 1845,60Z" fill="#0d0404"/>
  </g>
</svg>
