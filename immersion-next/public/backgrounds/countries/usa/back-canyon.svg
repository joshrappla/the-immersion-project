  <path d="M0,0 L0,300 Q80,280 160,320 Q200,340 240,310 L240,0Z" fill="#2a0e04" opacity="0.88"/>
  <!-- Left mesa step -->
  <path d="M240,310 Q280,290 320,310 Q360,330 400,300 L400,0 L240,0Z" fill="#1e0b03" opacity="0.82"/>
  <!-- Center canyon vista -->
  <path d="M400,300 Q480,260 560,290 Q640,320 720,270 Q760,250 800,280 L800,400 L400,400Z" fill="#2a0e04" opacity="0.6"/>
  <!-- Right canyon wall -->
  <path d="M1520,0 L1920,0 L1920,300 Q1840,280 1760,320 Q1720,340 1680,305 L1680,0Z" fill="#2a0e04" opacity="0.88"/>
  <path d="M1520,310 Q1480,290 1440,310 Q1400,330 1360,300 L1360,0 L1520,0Z" fill="#1e0b03" opacity="0.82"/>
  <!-- Butte / mesa center background -->
  <path d="M750,120 L750,280 Q810,265 870,280 L870,120Z" fill="#1a0a02" opacity="0.7"/>
  <rect x="745" y="105" width="130" height="18" fill="#1a0a02" opacity="0.7"/>
