    <polygon points="110,-60 230,-60 170,-110" fill="#061525"/>
    <path d="M150,-60 Q170,-90 190,-60" fill="none" stroke="#061525" stroke-width="3"/>
    <!-- Dragon head -->
    <path d="M340,30 Q370,10 380,25 Q370,35 355,38Z" fill="#061525"/>
    <!-- Oars -->
    <line x1="60" y1="42" x2="40" y2="70" stroke="#061525" stroke-width="3" opacity="0.6"/>
    <line x1="100" y1="44" x2="80" y2="72" stroke="#061525" stroke-width="3" opacity="0.6"/>
    <line x1="200" y1="44" x2="180" y2="72" stroke="#061525" stroke-width="3" opacity="0.6"/>
    <line x1="260" y1="43" x2="240" y2="71" stroke="#061525" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- Longship 2 (distant, smaller) -->
