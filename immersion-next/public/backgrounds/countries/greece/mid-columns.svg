<svg viewBox="0 0 1920 280" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Temple of Poseidon style (Cape Sounion) -->
  <g fill="#0c1a2e" opacity="0.88" transform="translate(300,60)">
    <rect x="0" y="180" width="580" height="25"/>
    <rect x="-8" y="200" width="596" height="18"/>
    <!-- Columns -->
    <rect x="25" y="60" width="26" height="122"/><rect x="78" y="60" width="26" height="122"/>
    <rect x="131" y="60" width="26" height="122"/><rect x="184" y="60" width="26" height="122"/>
    <rect x="237" y="60" width="26" height="122"/><rect x="290" y="60" width="26" height="122"/>
    <rect x="343" y="60" width="26" height="122"/><rect x="396" y="60" width="26" height="122"/>
    <rect x="449" y="60" width="26" height="122"/><rect x="531" y="60" width="26" height="122"/>
    <!-- Entablature -->
    <rect x="0" y="42" width="580" height="20"/>
    <!-- Pediment -->
    <polygon points="-10,42 290,-28 590,42"/>
  </g>
  <!-- Separate standing columns (right, ruined) -->
  <g fill="#0c1a2e" opacity="0.7" transform="translate(1300,80)">
    <rect x="0" y="0" width="24" height="180"/>
    <rect x="-4" y="-8" width="32" height="12"/><!-- capital -->
    <rect x="60" y="20" width="24" height="160"/>
    <rect x="56" y="12" width="32" height="12"/>
    <rect x="120" y="0" width="24" height="180"/>
    <rect x="116" y="-8" width="32" height="12"/>
    <!-- Broken column piece on ground -->
    <ellipse cx="200" cy="195" rx="30" ry="12"/>
    <ellipse cx="255" cy="200" rx="22" ry="9"/>
  </g>
  <rect width="1920" height="280" fill="url(#fade)"/>
</svg>
