      <path d="M130,130 Q155,100 180,130 L180,175 L130,175Z"/>
      <path d="M200,120 Q225,90 250,120 L250,168 L200,168Z"/>
      <path d="M270,115 Q295,85 320,115 L320,165 L270,165Z"/>
      <path d="M340,112 Q365,82 390,112 L390,162 L340,162Z"/>
      <path d="M410,112 Q435,82 460,112 L460,162 L410,162Z"/>
      <path d="M480,113 Q505,83 530,113 L530,163 L480,163Z"/>
      <path d="M550,115 Q575,85 600,115 L600,165 L550,165Z"/>
